site_name: Claude Code 源码导读手册
site_description: A public-facing source guide for understanding Claude Code internals
site_url: https://t0ugh.github.io/claude-code-source-guide/
repo_url: https://github.com/T0UGH/claude-code-source-guide
repo_name: T0UGH/claude-code-source-guide

docs_dir: docs
site_dir: site

use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true


exclude_docs: |
  guidebook/README.md
  guidebook/volume-2/README.md
  guidebook/volume-3/README.md
  guidebook/volume-4/README.md
  guidebook/volume-5/README.md
  guidebook/volume-6/README.md
  notes/*
  superpowers/*
  guidebook/00-mapping-table-v2.md
  guidebook/01-volume-one-runtime-foundation.md

validation:
  omitted_files: ignore
  absolute_links: warn
  unrecognized_links: warn

extra_javascript:
  - javascripts/mermaid-init.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

